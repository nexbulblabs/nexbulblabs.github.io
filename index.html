<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>NexBulb Labs</title>

  <meta
    name="description"
    content="Official website of NexBulb Labs. Explore our apps, privacy policies, support pages, and legal information."
  >

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: #f5f7ff;
      background:
        radial-gradient(circle at top, #1d315f 0%, #0c1428 45%, #070b16 100%);
      display: flex;
      flex-direction: column;
    }

    header {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 24px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .brand-icon {
      width: 42px;
      height: 42px;
      border-radius: 13px;
      display: grid;
      place-items: center;
      font-size: 22px;
      background: linear-gradient(135deg, #6ca8ff, #9b72ff);
      box-shadow: 0 8px 28px rgba(108, 168, 255, 0.3);
    }

    main {
      flex: 1;
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      padding: 80px 24px;
      text-align: center;
    }

    .label {
      display: inline-block;
      padding: 8px 14px;
      margin-bottom: 24px;
      border: 1px solid rgba(139, 181, 255, 0.35);
      border-radius: 999px;
      color: #b9d1ff;
      background: rgba(108, 168, 255, 0.08);
      font-size: 0.9rem;
    }

    h1 {
      max-width: 760px;
      margin: 0 auto;
      font-size: clamp(2.5rem, 7vw, 5rem);
      line-height: 1.05;
      letter-spacing: -2px;
    }

    h1 span {
      color: #88b9ff;
    }

    .intro {
      max-width: 650px;
      margin: 26px auto 0;
      color: #aeb8cc;
      font-size: 1.08rem;
      line-height: 1.75;
    }

    .links {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 38px;
    }

    .button {
      display: inline-block;
      padding: 13px 20px;
      border-radius: 12px;
      color: #ffffff;
      text-decoration: none;
      font-weight: 600;
      background: linear-gradient(135deg, #4f8cff, #805fff);
      transition: transform 0.2s ease;
    }

    .button:hover {
      transform: translateY(-2px);
    }

    .button-secondary {
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.06);
    }

    footer {
      padding: 28px 24px;
      color: #7f8aa0;
      text-align: center;
      font-size: 0.9rem;
    }

    @media (max-width: 600px) {
      main {
        padding-top: 55px;
      }

      h1 {
        letter-spacing: -1px;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="brand">
      <div class="brand-icon">💡</div>
      <span>NexBulb Labs</span>
    </div>
  </header>

  <main>
    <div class="label">Independent App Studio</div>

    <h1>
      Building useful apps for
      <span>everyday progress.</span>
    </h1>

    <p class="intro">
      NexBulb Labs develops thoughtful Android and web applications
      focused on productivity, learning, finance, and everyday utility.
    </p>

    <div class="links">
      <a class="button" href="./privacy/">
        Privacy Policies
      </a>

      <a
        class="button button-secondary"
        href="https://github.com/nexbulblabs"
      >
        GitHub
      </a>
    </div>
  </main>

  <footer>
    © 2026 NexBulb Labs. All rights reserved.
  </footer>
</body>
</html>
